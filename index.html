<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Yoast SEO Optimization replica -->
    <title>Arunodaya Pharmacy College Bidar - Arunodaya Pharmacy College Of Pharmacy Aurad</title>
    <meta name="description"
        content="Arunodaya Pharmacy College Of Pharmacy Aurad (B), affiliated to BEA. Qualified Faculty, Best Infrastructure, Placements, and Certification.">
    <link rel="shortcut icon"
        href="https://arunodayaginstitutions.in/wp-content/uploads/2024/05/cropped-arunodaya-pharmacy-logo.png"
        type="image/x-icon">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: '#0c2b5c',
                        brandBlue: '#0158a5',
                        brandCyan: '#23b1e7',
                        brandGreen: '#47ba7d',
                        brandLightGray: '#f4f6f8',
                    },
                    fontFamily: {
                        sans: ['Mulish', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Top Utility Bar (Shared Header Section) -->
    <div id="top-bar"></div>

    <!-- Main Navigation Header (Shared Header Section) -->
    <header id="main-header"></header>

    <!-- Page Specific Main Content Area -->
    <main id="page-content" class="min-h-screen">

        <!-- Hero Slider -->
        <div id="hero-slider" class="hero-slider shadow-inner"></div>

        <!-- Highlights Section -->
        <section class="max-w-7xl mx-auto px-6 py-12">
            <div id="highlights-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 animate-slide-up">
            </div>
        </section>

        <!-- Courses Highlight -->
        <section class="max-w-5xl mx-auto px-6 py-6 animate-slide-up">
            <div id="courses-highlight"></div>
        </section>

        <!-- Facilities Summary -->
        <section class="bg-slate-50 border-t border-b border-slate-200 py-16 px-6">
            <div class="max-w-7xl mx-auto">
                <h1 class="text-3xl md:text-4xl font-extrabold text-brandNavy font-poppins text-center mb-10 tracking-tight"
                    id="facilities-title-home">Our Facilities</h1>
                <div id="facilities-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 animate-slide-up">
                </div>
            </div>
        </section>

        <!-- Welcome section -->
        <section class="max-w-6xl mx-auto px-6 py-16 animate-slide-up">
            <div id="welcome-section"></div>
        </section>

        <!-- Placements Section -->
        <section class="bg-slate-100 py-16 px-6 border-t border-b border-slate-200">
            <div class="max-w-7xl mx-auto">
                <h2 id="placements-title"
                    class="text-3xl md:text-4xl font-extrabold text-brandNavy font-poppins text-center mb-10 tracking-tight">
                </h2>
                <div id="placements-grid"
                    class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-9 gap-4 max-w-6xl mx-auto animate-slide-up">
                </div>
            </div>
        </section>

        <!-- Our Members -->
        <section class="max-w-7xl mx-auto px-6 py-16">
            <h2 id="members-title"
                class="text-3xl md:text-4xl font-extrabold text-brandNavy font-poppins text-center mb-10 tracking-tight">
            </h2>
            <div id="members-grid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 max-w-6xl mx-auto animate-slide-up"></div>
        </section>

        <!-- Vision & Mission -->
        <section class="bg-slate-50 border-t border-b border-slate-200 py-16 px-6">
            <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 animate-slide-up">
                <div id="vision-box"></div>
                <div id="mission-box"></div>
            </div>
        </section>

        <!-- Why Us Section -->
        <section class="py-16 bg-brandNavy text-white">
            <h3 id="why-us-title"
                class="text-3xl md:text-4xl font-extrabold font-poppins text-center mb-10 tracking-tight text-brandGreen">
            </h3>
            <div id="why-us-list" class="animate-slide-up"></div>
        </section>

        <!-- Stats counters -->
        <section class="border-b border-slate-200 py-12 px-6">
            <div id="stats-container"
                class="max-w-5xl mx-auto flex flex-wrap justify-center items-center gap-6 animate-slide-up"></div>
        </section>

        <!-- Announcements & Quick Links -->
        <section class="max-w-7xl mx-auto px-6 py-16 grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Announcements Ticker (Col 1 & 2) -->
            <div class="lg:col-span-2 border border-slate-200 rounded-3xl p-6 shadow bg-white">
                <h2 id="announcements-title"
                    class="text-2xl font-bold font-poppins text-brandNavy mb-6 border-b-2 border-brandGreen w-fit pb-1">
                </h2>
                <div class="ticker-container">
                    <div id="announcements-ticker-items" class="ticker-wrapper flex flex-col"></div>
                </div>
            </div>

            <!-- Quick Links (Col 3) -->
            <div class="border border-slate-200 rounded-3xl p-6 shadow bg-white flex flex-col justify-between">
                <div>
                    <h2 id="home-quick-links-title"
                        class="text-2xl font-bold font-poppins text-brandNavy mb-6 border-b-2 border-brandGreen w-fit pb-1">
                    </h2>
                    <div id="home-quick-links" class="flex flex-col gap-4"></div>
                </div>
            </div>
        </section>

        <!-- Modal Slider POPUP -->
        <div id="myModal" class="lightbox-modal flex items-center justify-center">
            <div class="relative bg-white rounded-3xl max-w-4xl w-[90%] overflow-hidden shadow-2xl p-4 m-auto">
                <span
                    class="close absolute top-3 right-5 text-4xl font-bold text-slate-800 cursor-pointer hover:text-black z-50">&times;</span>
                <div class="slider relative w-full overflow-hidden rounded-2xl">
                    <div id="slideBox" class="flex transition-transform duration-500"></div>
                    <!-- Slide controls -->
                    <button
                        class="absolute top-1/2 left-4 -translate-y-1/2 bg-black bg-opacity-40 text-white h-10 w-10 flex items-center justify-center rounded-full text-xl font-bold hover:bg-opacity-60 transition-opacity"
                        onclick="plusSlides(-1)">&#10094;</button>
                    <button
                        class="absolute top-1/2 right-4 -translate-y-1/2 bg-black bg-opacity-40 text-white h-10 w-10 flex items-center justify-center rounded-full text-xl font-bold hover:bg-opacity-60 transition-opacity"
                        onclick="plusSlides(1)">&#10095;</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Shared Footer Area -->
    <footer id="main-footer" class="relative"></footer>

    <!-- Single Source of Truth Data -->
    <script src="content.js"></script>
    <!-- Rendering & Page Routing Controller -->
    <script src="main.js"></script>
</body>

</html>
